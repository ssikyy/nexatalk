# =============================================================
# NexaTalk 主配置文件
# 说明：此文件为所有环境公共配置，敏感值通过环境变量覆盖
#       开发时默认激活 dev profile，生产部署时设置 SPRING_PROFILES_ACTIVE=prod
# =============================================================

spring:
  application:
    name: server-api

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # 默认激活 dev 环境（生产部署通过环境变量 SPRING_PROFILES_ACTIVE=prod 覆盖）
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # -------------------------------------------------------
  # 数据源配置（基础项，env-specific 文件中会覆盖 url/password）
  # -------------------------------------------------------
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库连接 URL —— 优先读取环境变量，开发时使用默认值
    url: ${DB_URL:jdbc:mysql://localhost:3306/nexatalk?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:}
    # 密码从环境变量读取，严禁使用默认值
    hikari:
      # 连接池最大连接数
      maximum-pool-size: 20
      # 连接最小空闲数
      minimum-idle: 5
      # 连接超时时间（毫秒）
      connection-timeout: 30000
      # 连接最大空闲时间（毫秒）
      idle-timeout: 600000
      # 连接最大生命周期（毫秒），需小于 MySQL wait_timeout
      max-lifetime: 1800000

  # -------------------------------------------------------
  # Flyway 数据库迁移配置
  # -------------------------------------------------------
  flyway:
    enabled: true
    # 迁移脚本存放路径
    locations: classpath:db/migration
    # 编码
    encoding: UTF-8
    # 基线版本（已有数据库首次引入 Flyway 时使用）
    baseline-on-migrate: true
    baseline-version: 0
    # 自动修复失败的迁移（开发环境启用）
    repair: true

  # -------------------------------------------------------
  # Redis 缓存配置
  # -------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      # 使用数据库 0
      database: 0
      lettuce:
        pool:
          # 连接池最大连接数
          max-active: 16
          # 最大等待时间（毫秒），-1 表示不限
          max-wait: -1ms
          # 最大空闲连接数
          max-idle: 8
          # 最小空闲连接数
          min-idle: 0
      # 连接超时（毫秒）
      timeout: 3000ms

  # -------------------------------------------------------
  # MyBatis-Plus 配置
  # -------------------------------------------------------
  jackson:
    # 时间字段统一返回 ISO-8601 格式字符串
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# -------------------------------------------------------
# Web 服务端口
# -------------------------------------------------------
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# -------------------------------------------------------
# Knife4j API 文档配置
# -------------------------------------------------------
springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}
    path: /swagger-ui.html

knife4j:
  enable: ${KNIFE4J_ENABLE:false}
  setting:
    # 开启生产环境屏蔽（生产上关闭文档访问）
    production: ${KNIFE4J_PRODUCTION:true}

# -------------------------------------------------------
# JWT 配置
# -------------------------------------------------------
jwt:
  # 签名密钥，生产环境通过环境变量 JWT_SECRET 注入（至少 256 bit）
  secret: ${JWT_SECRET:NexaTalkDefaultSecretKeyForDevelopment2024MustBeAtLeast256Bits}
  # Access Token 有效期（毫秒）：7 天
  expiration: ${JWT_EXPIRATION:604800000}
  # Token 请求头名称
  header: Authorization
  # Token 前缀
  prefix: "Bearer "

# -------------------------------------------------------
# AI 功能配置
# -------------------------------------------------------
ai:
  # 是否开启 AI 功能（false=关闭，接口降级返回原始内容）
  enabled: ${AI_ENABLED:false}
  # API Base URL，兼容 OpenAI 规范的接口均可替换（如通义千问、讯飞星火）
  base-url: ${AI_BASE_URL:https://api.openai.com}
  # API Key，通过环境变量注入，严禁硬编码
  api-key: ${AI_API_KEY:}
  # 使用的模型名称
  model: ${AI_MODEL:qwen3.5-plus}
  # 单次请求超时（毫秒）
  timeout-ms: ${AI_TIMEOUT_MS:30000}

# -------------------------------------------------------
# MyBatis-Plus 全局配置
# -------------------------------------------------------
mybatis-plus:
  configuration:
    # 开启驼峰命名转换（数据库 created_at -> Java createdAt）
    map-underscore-to-camel-case: true
    # 日志级别（dev 下可改为 DEBUG 查看 SQL）
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      # 主键策略：自增
      id-type: auto
      # 逻辑删除字段（暂未启用，预留）
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# -------------------------------------------------------
# 文件上传配置
# -------------------------------------------------------
app:
  upload:
    # 文件存储路径（默认使用项目运行目录下的 uploads，可通过环境变量覆盖）
    path: ${APP_UPLOAD_PATH:./uploads}
    # 文件访问前缀
    prefix: ${APP_UPLOAD_PREFIX:/uploads}
