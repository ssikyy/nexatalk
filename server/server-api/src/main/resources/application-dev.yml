# =============================================================
# NexaTalk 开发环境配置
# 说明：本地开发使用，所有值均为明文（不提交生产密码）
#       使用 spring.profiles.active=dev 激活（已在 application.yml 设为默认）
# =============================================================

spring:
  config:
    # 允许在 server-api 目录下放置不入库的 .env 覆盖本地数据库/Redis 凭据
    import: optional:file:.env[.properties]

  # -------------------------------------------------------
  # 开发环境数据源（直连本地 MySQL）
  # -------------------------------------------------------
  datasource:
    url: jdbc:mysql://localhost:3306/nexatalk?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  # -------------------------------------------------------
  # 开发环境 Redis（本地无密码）
  # -------------------------------------------------------
  data:
    redis:
      host: localhost
      port: 6379
      password:

  # -------------------------------------------------------
  # Flyway 配置（开发环境允许 repair 修复失败的迁移）
  # -------------------------------------------------------
  flyway:
    clean-disabled: false

# -------------------------------------------------------
# 日志级别（开发环境开启 DEBUG 可查看完整 SQL）
# -------------------------------------------------------
logging:
  level:
    com.ttikss.nexatalk: DEBUG
    org.springframework.web: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

knife4j:
  enable: true
  setting:
    production: false
