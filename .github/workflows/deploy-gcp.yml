name: Deploy To GCP

on:
  push:
    branches:
      - main
      - codex-gcp-docker-deploy
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: false
        default: codex-gcp-docker-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      DEPLOY_APP_DIR: ${{ vars.DEPLOY_APP_DIR || '/opt/nexatalk' }}
    steps:
      - name: Validate deploy settings
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "${{ secrets.DEPLOY_SSH_KEY }}"

      - name: Resolve branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.branch }}" ]; then
            echo "name=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$DEPLOY_APP_DIR' APP_BRANCH='${{ steps.branch.outputs.name }}' sh '$DEPLOY_APP_DIR/deploy/update-on-server.sh'"
